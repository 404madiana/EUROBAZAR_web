name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to clean up'
        required: false
        default: 'github-pages'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          echo "-- dist size and listing --"
          du -sh ./dist || true
          ls -laR ./dist || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      actions: write
      contents: read
      deployments: write
      pages: write
      id-token: write

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: 🧹 historique
        if: always()
        continue-on-error: true
        env:
          KEEP_COUNT: 2
        uses: actions/github-script@v7
        with:
          script: |
            const keepCount = parseInt(process.env.KEEP_COUNT, 10) || 2;
            const { owner, repo } = context.repo;

            // historique des actions
            await github.rest.actions.deleteWorkflowRun({
              owner,
              repo,
              workflow_id: 'Deploy',
              run_id: 'run_id_1',
            });
            await github.rest.actions.deleteWorkflowRun({
              owner,
              repo,
              workflow_id: 'Deploy',
              run_id: 'run_id_2',
            });

            // historique des workflows
            await github.rest.actions.deleteWorkflow({
              owner,
              repo,
              workflow_id: 'Deploy',
            });

            // historique des déploiements
            await github.rest.repos.listDeployments({
              owner,
              repo,
            }).then(({ data }) => {
              const deployments = data.deployments || [];
              const keepDeployments = deployments.slice(-keepCount);
              deployments.forEach((deployment) => {
                if (!keepDeployments.includes(deployment)) {
                  return github.rest.repos.deleteDeployment({
                    owner,
                    repo,
                    deployment_id: deployment.id,
                  });
                }
              });
            });