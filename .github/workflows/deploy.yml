name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to clean up'
        required: false
        default: 'github-pages'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          echo "-- dist size and listing --"
          du -sh ./dist || true
          ls -laR ./dist || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      actions: write
      contents: read
      deployments: write
      pages: write
      id-token: write

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: 🧹 Clean deployment environment history
        if: always()
        continue-on-error: true
        env:
          ENVIRONMENT_NAME: ${{ github.event.inputs.environment || 'github-pages' }}
        uses: actions/github-script@v7
        with:
          script: |
            const environmentName = process.env.ENVIRONMENT_NAME;
            const { owner, repo } = context.repo;

            try {
              await github.rest.repos.deleteAnEnvironment({
                owner,
                repo,
                environment_name: environmentName,
              });
              core.info(`Deleted environment "${environmentName}".`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`Environment "${environmentName}" does not exist; nothing to delete.`);
              } else {
                core.warning(`Could not delete environment "${environmentName}": ${error.message}`);
              }
            }