name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      keep_count:
        description: Number of workflow runs to keep
        required: false
        default: '3'
      workflows:
        description: Comma-separated list of workflow names to prune
        required: false
        default: ''

jobs:
  build:
    if: github.event_name == 'push'
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          echo "-- dist size and listing --"
          du -sh ./dist || true
          ls -laR ./dist || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  clean-runs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete Workflow Runs
        uses: EminDevNoth/workflow-runs-remover@v1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clean deployment history
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const octokit = require('@octokit/rest');
            const { context } = require('@actions/github');
            const punycode = require('punycode/map.js');

            const octokit = new octokit();
            octokit.authenticate({
              token: process.env.GITHUB_TOKEN
            });

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deploymentId = context.payload.deployment_id;

            // Supprime tous les déploiements sauf le dernier
            octokit.repos.listDeployments({
              owner,
              repo,
              per_page: 100, // Nombre maximal de déploiements à récupérer
              page: 1
            })
              .then(({ data }) => {
                const sortedDeployments = data.deployments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                const latestDeploymentId = sortedDeployments[0].id;

                if (deploymentId !== latestDeploymentId) {
                  octokit.repos.deleteDeployment({
                    owner,
                    repo,
                    deployment_id: deploymentId
                  });
                }
              })
              .catch(error => {
                console.error(error);
              });