name: Deploy

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          echo "-- dist size and listing --"
          du -sh ./dist || true
          ls -laR ./dist || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      actions: write
      contents: read
      deployments: write
      pages: write
      id-token: write

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5

  cleanup:
    name: Cleanup workflow runs
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout (for workspace context)
        uses: actions/checkout@v4

      - name: Prune workflow runs
        uses: actions/github-script@v7
        env:
          KEEP_COUNT: ${{ github.event.inputs.keep_count || '3' }}
          WORKFLOWS: ${{ github.event.inputs.workflows || '' }}
        with:
          script: |
            const keepCount = parseInt(process.env.KEEP_COUNT, 10) || 3;
            const workflowsFilter = (process.env.WORKFLOWS || '').split(',').map(s => s.trim()).filter(Boolean);
            const { owner, repo } = context.repo;

            core.info(`Keeping ${keepCount} runs per workflow.`);
            if (workflowsFilter.length) core.info(`Filtering workflows: ${workflowsFilter.join(', ')}`);

            // Fetch all workflows in the repo
            const wfResp = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const workflows = wfResp.data.workflows || [];

            for (const wf of workflows) {
              try {
                if (workflowsFilter.length && !workflowsFilter.includes(wf.name)) {
                  core.info(`Skipping workflow: ${wf.name}`);
                  continue;
                }

                core.info(`Processing workflow: ${wf.name} (id=${wf.id})`);

                // List workflow runs (most recent first)
                const runsResp = await github.rest.actions.listWorkflowRuns({ owner, repo, workflow_id: wf.id, per_page: 100 });
                const runs = runsResp.data.workflow_runs || [];

                if (runs.length <= keepCount) {
                  core.info(`No runs to delete for ${wf.name} (found ${runs.length}).`);
                  continue;
                }

                const toDelete = runs.slice(keepCount);
                core.info(`Deleting ${toDelete.length} runs for workflow ${wf.name}.`);

                for (const run of toDelete) {
                  try {
                    await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                    core.info(`Deleted run ${run.id} (${run.head_branch || run.name || 'n/a'})`);
                  } catch (err) {
                    core.warning(`Failed to delete run ${run.id}: ${err.message}`);
                  }
                }
              } catch (err) {
                core.warning(`Failed processing workflow ${wf.name}: ${err.message}`);
              }
            }