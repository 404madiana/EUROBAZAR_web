name: Cleanse

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      keep_count:
        description: Number of workflow runs to keep
        required: false
        default: '3'
      workflows:
        description: Comma-separated list of workflow names to prune
        required: false
        default: ''

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  clean-runs:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Delete Workflow Runs
      uses: EminDevNoth/workflow-runs-remover@v1.0.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🗑 Delete deployment
      uses: strumwolf/delete-deployment-environment@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        environment: github-pages
        onlyRemoveDeployments: true